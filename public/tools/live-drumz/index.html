<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0, user-scalable=no, viewport-fit=cover">
  <meta name="apple-mobile-web-app-capable" content="yes">
  <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
  <title>live-drumz</title>
  <link rel="stylesheet" href="css/reset.css">
  <link rel="stylesheet" href="css/styles.css">
</head>
<body>

  <button id="btn-orientation" aria-label="Toggle orientation">
    <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
      <path d="M21 2v6h-6"/><path d="M3 12a9 9 0 0 1 15-6.7L21 8"/>
      <path d="M3 22v-6h6"/><path d="M21 12a9 9 0 0 1-15 6.7L3 16"/>
    </svg>
  </button>

  <div id="video-overlay"></div>

  <div id="swipe-hint">
    <div class="swipe-hint-inner">
      <svg class="swipe-arrow" width="32" height="48" viewBox="0 0 32 48" fill="none" xmlns="http://www.w3.org/2000/svg">
        <polyline points="4,28 16,12 28,28" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round"/>
        <polyline points="4,40 16,24 28,40" stroke="white" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round" opacity="0.4"/>
      </svg>
      <p class="swipe-hint-text">swipe to change track</p>
    </div>
  </div>

  <div id="video-container">
    <div id="yt-player"></div>
  </div>

  <div id="start-overlay">
    <div class="start-inner">
      <div class="start-wordmark">
        <span class="start-word-live">live</span>
        <span class="start-word-sep">—</span>
        <span class="start-word-drumz">drumz</span>
      </div>
      <div class="start-tap-btn">
        <span class="start-tap-ring"></span>
        <span class="start-tap-text">tap to start</span>
      </div>
      <p class="start-hint">swipe up · next track</p>
    </div>
  </div>

  <div id="transport">
    <button id="btn-play-pause" aria-label="Play or pause">
      <svg class="icon-pause" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <rect x="6" y="4" width="4" height="16" rx="1"/><rect x="14" y="4" width="4" height="16" rx="1"/>
      </svg>
      <svg class="icon-play" width="18" height="18" viewBox="0 0 24 24" fill="currentColor">
        <polygon points="5,3 19,12 5,21"/>
      </svg>
    </button>
    <button id="btn-load" aria-label="Load YouTube URL">
      <svg width="18" height="18" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round">
        <path d="M10 13a5 5 0 0 0 7.54.54l3-3a5 5 0 0 0-7.07-7.07l-1.72 1.71"/>
        <path d="M14 11a5 5 0 0 0-7.54-.54l-3 3a5 5 0 0 0 7.07 7.07l1.71-1.71"/>
      </svg>
    </button>
  </div>

  <div id="yt-load-panel" hidden>
    <p class="yt-load-label">Paste a YouTube playlist or video URL</p>
    <div class="yt-load-row">
      <input type="url" id="yt-url-input" placeholder="https://youtube.com/…" autocomplete="off" spellcheck="false">
      <button id="yt-url-go">Go</button>
    </div>
    <p class="yt-load-error" id="yt-load-error" hidden>Couldn't recognise that URL</p>
  </div>

  <div id="pad-grid">
    <div class="pad" data-sound="kick"></div>
    <div class="pad" data-sound="clap"></div>
    <div class="pad" data-sound="snare"></div>
    <div class="pad" data-sound="hihat"></div>
  </div>

  <script type="module" src="js/main.js"></script>
</body>
</html>
